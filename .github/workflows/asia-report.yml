name: Asia Pre-Session Report

on:
  schedule:
    # 21:00 UTC, Sunday-Thursday (UTC).
    # This lands BEFORE the Asia/Sydney-Tokyo trading session opens
    # (Sydney opens ~22:00 UTC), covering pre-session for Mon-Fri
    # Asia sessions. Adjust if your broker's Asia open differs.
    - cron: "30 23 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-asia-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Asia report
        run: python main.py generate asia

      - name: Send Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SUMMARY=$(cat reports/latest_telegram_summary.txt)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${SUMMARY}"

      - name: Commit and push report
        run: |
          git config user.name "market-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Asia pre-session report $(date -u +%Y-%m-%d)"
          git push
