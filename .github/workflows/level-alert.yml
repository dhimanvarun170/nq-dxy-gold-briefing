name: Level Alert Watcher

on:
  schedule:
    - cron: "*/15 * * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-levels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check D/W/M levels and alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py check-levels

      - name: Commit updated alert state
        run: |
          git config user.name "market-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/level_alert_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update level alert state $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash origin main
          git push
